name: Update IPTV Sources

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-sources:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install requests

    - name: Update live sources
      run: python scripts/update_sources.py

    - name: Update VOD sources
      run: python scripts/update_vod_sources.py

    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"

        mkdir -p logs

        git add outputs/
        git add README.md

        if [ -n "$(ls -A logs 2>/dev/null)" ]; then
          git add logs/
        fi

        if git diff --staged --quiet; then
          echo "没有文件需要提交"
        else
          git commit -m "Auto-update IPTV sources - $(date +'%Y-%m-%d %H:%M:%S')"
          git push
        fi
